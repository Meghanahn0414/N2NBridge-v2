<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Blue rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#3D7FE8"/>

  <!-- Bridge deck / road -->
  <line x1="14" y1="68" x2="86" y2="68" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Arch -->
  <path d="M14 68 Q50 20 86 68" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Top mast -->
  <line x1="50" y1="20" x2="50" y2="13" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Vertical cables hanging from arch to deck -->
  <line x1="30" y1="52" x2="30" y2="68" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="40" y1="38" x2="40" y2="68" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="50" y1="33" x2="50" y2="68" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="60" y1="38" x2="60" y2="68" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="70" y1="52" x2="70" y2="68" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- End node circles -->
  <circle cx="14" cy="68" r="7" fill="white"/>
  <circle cx="86" cy="68" r="7" fill="white"/>
</svg>
