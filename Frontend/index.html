<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Complaint Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,16..72,400;0,16..72,500;1,16..72,400&family=Noto+Sans+Kannada:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Google Translate – hidden widget, controlled via JS -->
    <div id="google_translate_element" style="display:none"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', includedLanguages: 'kn,en', autoDisplay: false },
          'google_translate_element'
        );
      }
      // Called by our i18n changeLanguage: lang = 'kn' | 'en'
      window.__setGoogleTranslate = function(lang) {
        if (lang === 'en') {
          // Google Translate cannot cleanly un-translate a React SPA in place.
          // Clear the googtrans cookie and reload — the page will come up in English.
          var clearCookie = 'googtrans=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
          document.cookie = clearCookie;
          document.cookie = clearCookie.replace('path=/', 'path=/; domain=.' + location.hostname);
          location.reload();
          return;
        }
        // Switch to Kannada via the hidden widget combo
        var attempts = 0;
        function trySet() {
          var combo = document.querySelector('.goog-te-combo');
          if (combo) {
            combo.value = 'kn';
            combo.dispatchEvent(new Event('change', { bubbles: true }));
          } else if (attempts++ < 30) {
            setTimeout(trySet, 200);
          }
        }
        trySet();
      };
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
      // Google Translate injects its own <style> with:
      //   .skiptranslate { display: none !important; }
      // then stamps .skiptranslate on arbitrary page elements (including our bell icon).
      // We watch for that injection and immediately append a counter-rule that restores
      // visibility for the specific page elements we know should never be hidden.
      (function () {
        function addOverrideStyle() {
          var s = document.getElementById('__gt-override');
          if (!s) {
            s = document.createElement('style');
            s.id = '__gt-override';
            document.head.appendChild(s);
          }
          // Strategy: undo Google Translate's blanket ".skiptranslate { display:none }"
          // for ALL page-content elements (display:unset reverts to each element's
          // natural/inherited display value), then re-hide ONLY Google Translate's
          // own toolbar/widget elements by their specific selectors.
          s.textContent = [
            '.skiptranslate { display: unset !important; }',
            'iframe.skiptranslate { display: none !important; }',
            '#goog-gt-tt { display: none !important; }',
            '.goog-te-banner-frame { display: none !important; }',
            '.goog-te-balloon-frame { display: none !important; }',
            '#google_translate_element { display: none !important; }',
            // Belt-and-suspenders for key layout containers
            'div.notification-icon { display: flex !important; }',
            '.header-right { display: flex !important; }',
            '.app-header { display: block !important; }',
            'div.sidebar-footer { display: flex !important; flex-direction: column !important; }',
            '.sidebar-logout-card { display: block !important; }',
            '.sidebar-logout-actions { display: flex !important; }',
            '.sidebar-user-btn { display: flex !important; }',
            '.user-profile-section { display: inline-block !important; }',
            // Force Material Symbols ligature rendering — GT inserts <font> children
            // inside icon spans which override font-family and break ligatures.
            '.material-symbols-rounded,.material-symbols-rounded *,',
            '.material-symbols-outlined,.material-symbols-outlined *,',
            '.material-icons,.material-icons * {',
            "  font-family:'Material Symbols Rounded','Material Icons' !important;",
            '  font-weight:normal !important;',
            '  font-style:normal !important;',
            '  letter-spacing:normal !important;',
            '  text-transform:none !important;',
            '  white-space:nowrap !important;',
            '  direction:ltr !important;',
            "  -webkit-font-feature-settings:'liga' !important;",
            "  font-feature-settings:'liga' !important;",
            '}',
          ].join('\n');
        }
        var gtObserver = new MutationObserver(function (mutations) {
          for (var i = 0; i < mutations.length; i++) {
            var nodes = mutations[i].addedNodes;
            for (var j = 0; j < nodes.length; j++) {
              var node = nodes[j];
              if (node.nodeName === 'STYLE' &&
                  node.textContent &&
                  node.textContent.indexOf('skiptranslate') !== -1) {
                addOverrideStyle();
              }
            }
          }
        });
        gtObserver.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>

    <style>
      /* Hide the Google Translate toolbar so it's invisible to the user */
      body { top: 0 !important; }
      .goog-te-banner-frame, #goog-gt-tt,
      .goog-te-balloon-frame, .goog-tooltip,
      .goog-te-gadget-icon { display: none !important; }
      /* Only hide Google Translate's OWN skiptranslate elements (the toolbar/widget),
         NOT arbitrary page elements that Google Translate also stamps with this class */
      #google_translate_element.skiptranslate,
      body > .skiptranslate,
      iframe.skiptranslate { display: none !important; }
      /* Prevent Google Translate from touching user names, IDs, emails */
      .notranslate, .notranslate * { font-family: inherit !important; }
    </style>

    <style>
      @media print {
        /* Hide sidebar, topbar nav, and bottom buttons — print only the main content */
        nav, aside, .sidebar, [class*="sidebar"], [class*="Sidebar"],
        [class*="bottom-nav"], [class*="bottomNav"] { display: none !important; }
        /* Remove sticky header so it prints inline */
        header { position: static !important; }
        body { background: #fff !important; }
        /* Ensure cards don't break across pages */
        [style*="border-radius:22px"], [style*="border-radius: 22px"] { break-inside: avoid; }
        @page { margin: 1.5cm; size: A4 landscape; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
