<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/fonts.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/colors.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/typography.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/spacing.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/elevation.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/base.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/styles.css">
<script src="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; }
</style>
</helmet>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px;background:var(--bg-page);font-family:var(--font-sans);background-image:radial-gradient(circle at 50% 0%,var(--blue-50),var(--bg-page) 60%)">
  <div style="width:100%;max-width:430px">

    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:24px">
      <img src="assets/logo-mark.svg" alt="N2Bridge" style="width:52px;height:52px;margin-bottom:16px" />
      <h1 style="font-family:var(--font-display);font-weight:600;font-size:26px;letter-spacing:-0.015em;color:var(--text-primary);margin:0 0 4px">Sign in to N2Bridge</h1>
      <p style="font-size:14.5px;color:var(--text-secondary);margin:0">The bridge between you and your government.</p>
    </div>

    <div style="background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:26px">

      <!-- role pills -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:4px;background:var(--bg-sunken);border-radius:var(--radius-md);margin-bottom:22px">
        <sc-for list="{{ cards }}" as="c" hint-placeholder-count="4">
          <button onClick="{{ c.select }}" style="{{ c.pillStyle }}">
            <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="{{ c.icon }}" size="{{ midSz }}" color="{{ c.iconColor }}" hint-size="18px,18px"></x-import>
            <span style="font-size:11.5px;font-weight:{{ c.weight }};color:{{ c.labelColor }};line-height:1">{{ c.short }}</span>
          </button>
        </sc-for>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px">
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:7px">{{ role.idLabel }}</label>
          <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Input" leading-icon="{{ role.idIcon }}" placeholder="{{ role.idPlaceholder }}" type="text" style="{{ fullW }}" hint-size="100%,44px"></x-import>
        </div>
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
            <label style="font-size:13px;font-weight:500;color:var(--text-primary)">Password</label>
            <a href="#" style="font-size:13px;color:var(--text-link);text-decoration:none;font-weight:500">Forgot?</a>
          </div>
          <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Input" leading-icon="lock" trailing-icon="eye-off" placeholder="Enter your password" type="password" style="{{ fullW }}" hint-size="100%,44px"></x-import>
        </div>

        <sc-if value="{{ role.note }}" hint-placeholder-val="">
          <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--info-bg);border:1px solid var(--blue-200);border-radius:var(--radius-md)">
            <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="info" size="{{ smSz }}" color="var(--info-fg)" hint-size="15px,15px"></x-import>
            <span style="font-size:12.5px;line-height:1.45;color:var(--blue-700)">{{ role.note }}</span>
          </div>
        </sc-if>

        <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Button" variant="{{ role.variant }}" size="lg" full-width="{{ yes }}" hint-size="100%,48px">{{ role.cta }}</x-import>
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin:18px 0">
        <div style="flex:1;height:1px;background:var(--divider)"></div>
        <span style="font-size:12px;color:var(--text-muted)">or</span>
        <div style="flex:1;height:1px;background:var(--divider)"></div>
      </div>

      <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Button" variant="secondary" size="lg" full-width="{{ yes }}" hint-size="100%,48px">{{ role.sso }}</x-import>
    </div>

    <p style="text-align:center;font-size:14px;color:var(--text-secondary);margin:20px 0 0">{{ role.help }} <a href="#" style="color:var(--text-link);text-decoration:none;font-weight:600">{{ role.helpLink }}</a></p>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:840}}">
class Component extends DCLogic {
  state = { role: 0 };

  renderVals() {
    const ACC = { blue: { solid: 'var(--blue-500)', soft: 'var(--blue-50)' }, clay: { solid: 'var(--clay-500)', soft: 'var(--clay-100)' } };
    const roles = [
      { short: 'Citizen', name: 'Citizen', icon: 'user-round', tone: 'clay', variant: 'accent',
        idLabel: 'Email or phone', idIcon: 'mail', idPlaceholder: 'you@example.com',
        cta: 'Sign in', sso: 'Continue with a sign-in link', help: 'New to N2Bridge?', helpLink: 'Create an account', note: '' },
      { short: 'Rep', name: 'Representative', icon: 'landmark', tone: 'blue', variant: 'primary',
        idLabel: 'Official email', idIcon: 'mail', idPlaceholder: 'name@council.gov',
        cta: 'Sign in', sso: 'Continue with government SSO', help: 'Need access?', helpLink: 'Contact your administrator', note: '' },
      { short: 'Field', name: 'Field officer', icon: 'map-pinned', tone: 'blue', variant: 'primary',
        idLabel: 'Officer ID', idIcon: 'id-card', idPlaceholder: 'e.g. FO-2048',
        cta: 'Sign in', sso: 'Continue with government SSO', help: 'Trouble signing in?', helpLink: 'Get help', note: '' },
      { short: 'Admin', name: 'Admin', icon: 'shield', tone: 'blue', variant: 'primary',
        idLabel: 'Admin email', idIcon: 'mail', idPlaceholder: 'admin@n2bridge.gov',
        cta: 'Sign in', sso: 'Continue with government SSO', help: 'Locked out?', helpLink: 'Recover admin access',
        note: 'Admin sign-in requires two-factor authentication. Have your device ready.' },
    ];

    const sel = this.state.role;
    const cards = roles.map((r, i) => {
      const a = ACC[r.tone];
      const on = i === sel;
      return {
        short: r.short, icon: r.icon,
        select: () => this.setState({ role: i }),
        iconColor: on ? a.solid : 'var(--text-muted)',
        labelColor: on ? 'var(--text-primary)' : 'var(--text-secondary)',
        weight: on ? 600 : 500,
        pillStyle: {
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, padding: '9px 4px',
          border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer',
          background: on ? 'var(--bg-surface)' : 'transparent',
          boxShadow: on ? 'var(--shadow-xs)' : 'none',
          fontFamily: 'var(--font-sans)',
          transition: 'background var(--dur-fast) var(--ease-standard)',
        },
      };
    });

    return {
      cards,
      role: roles[sel],
      fullW: { width: '100%' },
      yes: true,
      midSz: 18, smSz: 15,
    };
  }
}
</script>
</body>
</html>
