<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/fonts.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/colors.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/typography.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/spacing.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/elevation.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/tokens/base.css">
<link rel="stylesheet" href="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/styles.css">
<script src="_ds/n2bridge-design-system-a89818ba-c588-4413-97c4-408c89a1d577/_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; }
  @page { size: letter; margin: 0; }
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    *, *::before, *::after {
      animation-delay: -99s !important; animation-duration: .001s !important;
      animation-iteration-count: 1 !important; animation-fill-mode: both !important;
      animation-play-state: running !important; transition-duration: 0s !important;
    }
    html, body { height: auto; }
    /* outer page band: drop the viewport sizing, let it fit the sheet */
    body > x-dc > div, x-dc > div, div[style*="min-height:100vh"] {
      min-height: 100vh !important;
      justify-content: center !important;
    }
  }
</style>
</helmet>

<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 24px;background:linear-gradient(165deg,var(--blue-800),var(--blue-950));font-family:var(--font-sans);position:relative;overflow:hidden">

  <div style="position:absolute;right:-160px;top:-120px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(47,111,237,0.22),transparent 70%);pointer-events:none"></div>
  <div style="position:absolute;left:-140px;bottom:-160px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(224,132,70,0.13),transparent 70%);pointer-events:none"></div>

  <img src="assets/logo-wordmark-light.svg" alt="N2Bridge" style="height:42px;width:auto;margin-bottom:36px;position:relative" />

  <!-- ============ GATEWAY VIEW ============ -->
  <sc-if value="{{ isGateway }}" hint-placeholder-val="{{ true }}">
    <div style="width:100%;max-width:760px;position:relative">
      <div style="text-align:center;margin-bottom:32px">
        <h1 style="font-family:var(--font-display);font-weight:600;font-size:34px;letter-spacing:-0.02em;color:#fff;margin:0 0 8px">Welcome to N2Bridge</h1>
        <p style="font-size:16px;color:rgba(255,255,255,0.72);margin:0">Choose how you'd like to sign in.</p>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <sc-for list="{{ cards }}" as="c" hint-placeholder-count="4">
          <button onClick="{{ c.select }}" style="{{ c.tileStyle }}" onMouseEnter="{{ c.enter }}" onMouseLeave="{{ c.leave }}">
            <span style="{{ c.iconWrap }}">
              <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="{{ c.icon }}" size="{{ bigSz }}" color="{{ c.iconColor }}" hint-size="26px,26px"></x-import>
            </span>
            <span style="flex:1;text-align:left">
              <span style="display:block;font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--text-primary);margin-bottom:3px">{{ c.name }}</span>
              <span style="display:block;font-size:13.5px;color:var(--text-secondary);line-height:1.4">{{ c.desc }}</span>
            </span>
            <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="arrow-right" size="{{ midSz }}" color="var(--text-muted)" hint-size="20px,20px"></x-import>
          </button>
        </sc-for>
      </div>

      <p style="text-align:center;font-size:13px;color:rgba(255,255,255,0.55);margin:28px 0 0;display:flex;align-items:center;justify-content:center;gap:8px">
        <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="shield-check" size="{{ smSz }}" color="rgba(255,255,255,0.55)" hint-size="15px,15px"></x-import>
        Secure government access · Your data stays protected
      </p>
    </div>
  </sc-if>

  <!-- ============ FORM VIEW ============ -->
  <sc-if value="{{ isForm }}" hint-placeholder-val="{{ false }}">
    <div style="width:100%;max-width:440px;background:var(--bg-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);padding:32px;position:relative">

      <button onClick="{{ back }}" style="display:inline-flex;align-items:center;gap:6px;background:transparent;border:none;cursor:pointer;padding:0;margin-bottom:20px;font-family:var(--font-sans);font-size:14px;font-weight:500;color:var(--text-secondary)">
        <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="arrow-left" size="{{ smSz }}" color="var(--text-secondary)" hint-size="16px,16px"></x-import>
        All sign-in options
      </button>

      <div style="display:flex;align-items:center;gap:13px;margin-bottom:24px">
        <span style="{{ headWrap }}">
          <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="{{ role.icon }}" size="{{ midSz }}" color="{{ role.accentSolid }}" hint-size="22px,22px"></x-import>
        </span>
        <span>
          <span style="display:block;font-family:var(--font-display);font-weight:600;font-size:22px;color:var(--text-primary);line-height:1.1">{{ role.name }} sign-in</span>
          <span style="display:block;font-size:13px;color:var(--text-secondary);margin-top:2px">{{ role.desc }}</span>
        </span>
      </div>

      <div style="display:flex;flex-direction:column;gap:16px">
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:7px">{{ role.idLabel }}</label>
          <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Input" leading-icon="{{ role.idIcon }}" placeholder="{{ role.idPlaceholder }}" type="text" style="{{ fullW }}" hint-size="100%,44px"></x-import>
        </div>
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
            <label style="font-size:13px;font-weight:500;color:var(--text-primary)">Password</label>
            <a href="#" style="font-size:13px;color:var(--text-link);text-decoration:none;font-weight:500">Forgot password?</a>
          </div>
          <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Input" leading-icon="lock" trailing-icon="eye-off" placeholder="Enter your password" type="password" style="{{ fullW }}" hint-size="100%,44px"></x-import>
        </div>

        <sc-if value="{{ role.note }}" hint-placeholder-val="">
          <div style="display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--info-bg);border:1px solid var(--blue-200);border-radius:var(--radius-md)">
            <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Icon" name="info" size="{{ smSz }}" color="var(--info-fg)" hint-size="16px,16px"></x-import>
            <span style="font-size:13px;line-height:1.45;color:var(--blue-700)">{{ role.note }}</span>
          </div>
        </sc-if>

        <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Button" variant="{{ role.variant }}" size="lg" full-width="{{ yes }}" hint-size="100%,48px">{{ role.cta }}</x-import>

        <div style="display:flex;align-items:center;gap:14px">
          <div style="flex:1;height:1px;background:var(--divider)"></div>
          <span style="font-size:12px;color:var(--text-muted)">or</span>
          <div style="flex:1;height:1px;background:var(--divider)"></div>
        </div>

        <x-import component-from-global-scope="N2BridgeDesignSystem_a89818.Button" variant="secondary" size="lg" full-width="{{ yes }}" hint-size="100%,48px">{{ role.sso }}</x-import>
      </div>

      <p style="text-align:center;font-size:14px;color:var(--text-secondary);margin:22px 0 0">{{ role.help }} <a href="#" style="color:var(--text-link);text-decoration:none;font-weight:600">{{ role.helpLink }}</a></p>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  state = { role: null };

  _roles() {
    return [
      { key: 'citizen', name: 'Citizen', icon: 'user-round', tone: 'clay', variant: 'accent',
        desc: 'Report issues & track your cases',
        idLabel: 'Email or phone', idIcon: 'mail', idPlaceholder: 'you@example.com',
        cta: 'Sign in', sso: 'Continue with a sign-in link', help: 'New to N2Bridge?', helpLink: 'Create an account', note: '' },
      { key: 'rep', name: 'Representative', icon: 'landmark', tone: 'blue', variant: 'primary',
        desc: 'Manage casework & constituents',
        idLabel: 'Official email', idIcon: 'mail', idPlaceholder: 'name@council.gov',
        cta: 'Sign in', sso: 'Continue with government SSO', help: 'Need access?', helpLink: 'Contact your administrator', note: '' },
      { key: 'field', name: 'Field officer', icon: 'map-pinned', tone: 'blue', variant: 'primary',
        desc: 'Pick up assigned cases in the field',
        idLabel: 'Officer ID', idIcon: 'id-card', idPlaceholder: 'e.g. FO-2048',
        cta: 'Sign in', sso: 'Continue with government SSO', help: 'Trouble signing in?', helpLink: 'Get help', note: '' },
      { key: 'admin', name: 'Admin', icon: 'shield', tone: 'blue', variant: 'primary',
        desc: 'Platform administration & settings',
        idLabel: 'Admin email', idIcon: 'mail', idPlaceholder: 'admin@n2bridge.gov',
        cta: 'Sign in', sso: 'Continue with government SSO', help: 'Locked out?', helpLink: 'Recover admin access',
        note: 'Admin sign-in requires two-factor authentication. Have your device ready.' },
    ];
  }

  renderVals() {
    const ACC = { blue: { solid: 'var(--blue-500)', soft: 'var(--blue-50)' }, clay: { solid: 'var(--clay-500)', soft: 'var(--clay-100)' } };
    const roles = this._roles();
    const sel = this.state.role;

    const cards = roles.map((r, i) => {
      const a = ACC[r.tone];
      return {
        name: r.name, desc: r.desc, icon: r.icon, iconColor: a.solid,
        select: () => this.setState({ role: i }),
        enter: (e) => { const t = e.currentTarget; t.style.boxShadow = 'var(--shadow-md)'; t.style.borderColor = a.solid; t.style.transform = 'translateY(-2px)'; },
        leave: (e) => { const t = e.currentTarget; t.style.boxShadow = 'var(--shadow-xs)'; t.style.borderColor = 'var(--border-default)'; t.style.transform = 'none'; },
        iconWrap: { flex: 'none', width: 50, height: 50, borderRadius: 'var(--radius-md)', background: a.soft, display: 'flex', alignItems: 'center', justifyContent: 'center' },
        tileStyle: { display: 'flex', alignItems: 'center', gap: 15, padding: '18px 18px', background: 'var(--bg-surface)', border: '1.5px solid var(--border-default)', borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow-xs)', cursor: 'pointer', textAlign: 'left', fontFamily: 'var(--font-sans)', transition: 'box-shadow var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard), transform var(--dur-fast) var(--ease-standard)' },
      };
    });

    const role = sel === null ? null : { ...roles[sel], accentSolid: ACC[roles[sel].tone].solid };

    return {
      isGateway: sel === null,
      isForm: sel !== null,
      cards,
      role: role || {},
      back: () => this.setState({ role: null }),
      headWrap: role ? { flex: 'none', width: 42, height: 42, borderRadius: 'var(--radius-md)', background: ACC[roles[sel].tone].soft, display: 'flex', alignItems: 'center', justifyContent: 'center' } : {},
      fullW: { width: '100%' },
      yes: true,
      bigSz: 26, midSz: 22, smSz: 16, mid2: 20,
    };
  }
}
</script>
<script>
addEventListener('load', () => {
  (async () => {
    // wait for the DC runtime to render the role cards
    const start = Date.now();
    while (document.querySelectorAll('button').length < 4 && Date.now() - start < 8000) {
      await new Promise((r) => setTimeout(r, 100));
    }
    try { await document.fonts.ready; } catch (e) {}
    const imgs = Array.from(document.images).filter((i) => !i.complete);
    await Promise.race([
      Promise.allSettled(imgs.map((i) => i.decode())),
      new Promise((r) => setTimeout(r, 8000)),
    ]);
    setTimeout(() => window.print(), 600);
  })();
});
</script>
</body>
</html>
